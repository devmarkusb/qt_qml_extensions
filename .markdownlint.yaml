# Example config shipped with mb-pre-commit (see configs/v4). Edit freely; CMake may refresh
# this file on configure unless you disable PRE_COMMIT_INSTALL_EXAMPLE_CONFIG.
#
# Used by markdownlint-cli (see .pre-commit-config.yaml). Keeps technical READMEs
# with long URLs, tables, and unannotated fences from failing the hook.
default: true
MD022: false
MD040: false
MD031: false
MD012: false

# MD033/no-inline-html : Inline HTML : https://github.com/DavidAnson/markdownlint/blob/v0.35.0/doc/md033.md
# Disable inline html linter is needed for <details> <summary>
MD033: false

# MD013/line-length : Line length : https://github.com/DavidAnson/markdownlint/blob/v0.35.0/doc/md013.md
# Conforms to .clang-format ColumnLimit
# Update the comment in .clang-format if we no-longer tie these two column limits.
MD013:
  line_length: 119
  code_blocks: false
  # Pipe tables are one logical row per line; wrapping breaks the table.
  tables: false
