name: android-release

on:
  push:
    tags:
    - 'android-v*'
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'Android release workflow mode'
        required: true
        type: choice
        default: build_only
        options:
        - build_only
        - publish_build
        - publish_build_and_store_entry
        - update_store_entry_only
      track:
        description: 'Google Play track'
        required: true
        type: choice
        default: internal
        options:
        - internal
        - alpha
        - beta
        - production
      release_status:
        description: 'Google Play release status'
        required: true
        type: choice
        default: completed
        options:
        - completed
        - draft
      version_code:
        description: 'Android versionCode; defaults to the GitHub run number'
        required: false
        type: string
      version_name:
        description: 'Android versionName; defaults to the tag name or 0.1.<run_number>'
        required: false
        type: string
      store_entry_validate_only:
        description: 'Validate store entry changes without committing them'
        required: true
        type: boolean
        default: false
      store_entry_changes_not_sent_for_review:
        description: 'Commit store entry changes but leave them pending for manual review submission'
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-release:
    runs-on: ubuntu-24.04
    environment: ${{ github.event_name == 'workflow_dispatch' && (inputs.release_mode == 'update_store_entry_only' || inputs.release_mode == 'publish_build_and_store_entry' || (inputs.release_mode == 'publish_build' && inputs.track == 'production')) && 'google-play-production' || 'google-play-internal' }}

    env:
      ANDROID_API_LEVEL: '35'
      ANDROID_BUILD_TOOLS_VERSION: '35.0.0'
      ANDROID_NDK_VERSION: '28.0.13004108'
      BUILD_DIR: build/android-release
      KEYSTORE_PATH: /tmp/qt-qml-extensions-upload.keystore
      PACKAGE_NAME: org.cismypa.qtqmlextensionstestapp
      QT_ANDROID_ARCH: android_arm64_v8a
      QT_ANDROID_ABIS: arm64-v8a
      QT_INSTALL_DIR: /tmp/qt
      QT_VERSION: '6.9.3'
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH: /tmp/google-play-service-account.json
      SUPPLY_METADATA_PATH: fastlane/metadata/android

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'false'

    - name: Initialize submodules
      if: ${{ github.event_name == 'push' || inputs.release_mode == 'build_only' || inputs.release_mode == 'publish_build' || inputs.release_mode == 'publish_build_and_store_entry' }}
      run: |
        git config --global url."https://github.com/".insteadOf "git@github.com:"
        git submodule update --init --recursive --recommend-shallow

    - name: Set up Java
      if: ${{ github.event_name == 'push' || inputs.release_mode == 'build_only' || inputs.release_mode == 'publish_build' || inputs.release_mode == 'publish_build_and_store_entry' }}
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Android SDK
      if: ${{ github.event_name == 'push' || inputs.release_mode == 'build_only' || inputs.release_mode == 'publish_build' || inputs.release_mode == 'publish_build_and_store_entry' }}
      uses: android-actions/setup-android@v3

    - name: Install Android SDK packages
      if: ${{ github.event_name == 'push' || inputs.release_mode == 'build_only' || inputs.release_mode == 'publish_build' || inputs.release_mode == 'publish_build_and_store_entry' }}
      run: |
        sdkmanager \
          "platforms;android-${ANDROID_API_LEVEL}" \
          "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
          "ndk;${ANDROID_NDK_VERSION}"

    - name: Install Qt for Android
      if: ${{ github.event_name == 'push' || inputs.release_mode == 'build_only' || inputs.release_mode == 'publish_build' || inputs.release_mode == 'publish_build_and_store_entry' }}
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: linux
        target: android
        arch: ${{ env.QT_ANDROID_ARCH }}
        dir: ${{ env.QT_INSTALL_DIR }}
        modules: qt5compat
        install-deps: 'true'
        cache: 'true'
        setup-python: 'true'
        set-env: 'true'

    - name: Install host Qt tools
      if: ${{ github.event_name == 'push' || inputs.release_mode == 'build_only' || inputs.release_mode == 'publish_build' || inputs.release_mode == 'publish_build_and_store_entry' }}
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: linux
        target: desktop
        arch: linux_gcc_64
        dir: ${{ env.QT_INSTALL_DIR }}
        modules: qt5compat
        install-deps: 'true'
        cache: 'true'
        setup-python: 'false'
        set-env: 'false'

    - name: Resolve release metadata
      if: ${{ github.event_name == 'push' || inputs.release_mode == 'build_only' || inputs.release_mode == 'publish_build' || inputs.release_mode == 'publish_build_and_store_entry' }}
      run: |
        version_code="${{ inputs.version_code }}"
        version_name="${{ inputs.version_name }}"
        play_track="${{ inputs.track }}"
        release_status="${{ inputs.release_status }}"

        if [ -z "$version_code" ]; then
          version_code="$GITHUB_RUN_NUMBER"
        fi
        case "$version_code" in
          ''|*[!0-9]*)
            echo "version_code must be a positive integer." >&2
            exit 1
            ;;
        esac

        if [ -z "$version_name" ]; then
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version_name="${GITHUB_REF_NAME#android-v}"
          else
            version_name="0.1.${GITHUB_RUN_NUMBER}"
          fi
        fi
        if [ -z "$play_track" ]; then
          play_track="internal"
        fi
        if [ -z "$release_status" ]; then
          release_status="completed"
        fi

        echo "PLAY_TRACK=$play_track" >> "$GITHUB_ENV"
        echo "RELEASE_STATUS=$release_status" >> "$GITHUB_ENV"
        echo "VERSION_CODE=$version_code" >> "$GITHUB_ENV"
        echo "VERSION_NAME=$version_name" >> "$GITHUB_ENV"

    - name: Decode upload keystore
      if: ${{ github.event_name == 'push' || inputs.release_mode == 'build_only' || inputs.release_mode == 'publish_build' || inputs.release_mode == 'publish_build_and_store_entry' }}
      env:
        ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
      run: |
        if [ -z "$ANDROID_UPLOAD_KEYSTORE_BASE64" ]; then
          echo "ANDROID_UPLOAD_KEYSTORE_BASE64 secret is required." >&2
          exit 1
        fi
        printf '%s' "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
        chmod 600 "$KEYSTORE_PATH"

    - name: Configure Android build
      if: ${{ github.event_name == 'push' || inputs.release_mode == 'build_only' || inputs.release_mode == 'publish_build' || inputs.release_mode == 'publish_build_and_store_entry' }}
      env:
        QT_ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
        QT_ANDROID_KEYSTORE_KEY_PASS: ${{ secrets.ANDROID_KEYSTORE_KEY_PASS }}
        QT_ANDROID_KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
        QT_ANDROID_KEYSTORE_STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_STORE_PASS }}
      run: |
        qt_android_root="${QT_INSTALL_DIR}/Qt/${QT_VERSION}/${QT_ANDROID_ARCH}"
        qt_host_path="${QT_INSTALL_DIR}/Qt/${QT_VERSION}/gcc_64"

        for required in \
          "$QT_ANDROID_KEYSTORE_ALIAS" \
          "$QT_ANDROID_KEYSTORE_KEY_PASS" \
          "$QT_ANDROID_KEYSTORE_STORE_PASS"; do
          if [ -z "$required" ]; then
            echo "Android signing secrets are required." >&2
            exit 1
          fi
        done

        "${qt_android_root}/bin/qt-cmake" \
          -S . \
          -B "$BUILD_DIR" \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=26 \
          -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=./devenv/cmake/fetch-content-from-lockfile.cmake \
          -DANDROID_NDK_ROOT="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" \
          -DANDROID_SDK_ROOT="$ANDROID_HOME" \
          -DMB_UL_DEPLOYMENT_BUILD=ON \
          -DQT_ANDROID_ABIS="$QT_ANDROID_ABIS" \
          -DQT_ANDROID_MIN_SDK_VERSION=21 \
          -DQT_ANDROID_PACKAGE_NAME="$PACKAGE_NAME" \
          -DQT_ANDROID_SDK_BUILD_TOOLS_REVISION="$ANDROID_BUILD_TOOLS_VERSION" \
          -DQT_ANDROID_SIGN_AAB=TRUE \
          -DQT_ANDROID_TARGET_SDK_VERSION="$ANDROID_API_LEVEL" \
          -DQT_ANDROID_VERSION_CODE="$VERSION_CODE" \
          -DQT_ANDROID_VERSION_NAME="$VERSION_NAME" \
          -DQT_HOST_PATH="$qt_host_path" \
          -DUL_DEPLOYMENT_BUILD=ON

    - name: Build Android App Bundle
      if: ${{ github.event_name == 'push' || inputs.release_mode == 'build_only' || inputs.release_mode == 'publish_build' || inputs.release_mode == 'publish_build_and_store_entry' }}
      env:
        QT_ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
        QT_ANDROID_KEYSTORE_KEY_PASS: ${{ secrets.ANDROID_KEYSTORE_KEY_PASS }}
        QT_ANDROID_KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
        QT_ANDROID_KEYSTORE_STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_STORE_PASS }}
      run: cmake --build "$BUILD_DIR" --target aab

    - name: Locate AAB
      if: ${{ github.event_name == 'push' || inputs.release_mode == 'build_only' || inputs.release_mode == 'publish_build' || inputs.release_mode == 'publish_build_and_store_entry' }}
      id: aab
      run: |
        aab_path="$(find "$BUILD_DIR" -type f -name '*.aab' | sort | tail -n 1)"
        if [ -z "$aab_path" ]; then
          echo "No AAB was produced." >&2
          exit 1
        fi
        echo "path=$aab_path" >> "$GITHUB_OUTPUT"

    - name: Upload AAB artifact
      if: ${{ github.event_name == 'push' || inputs.release_mode == 'build_only' || inputs.release_mode == 'publish_build' || inputs.release_mode == 'publish_build_and_store_entry' }}
      uses: actions/upload-artifact@v4
      with:
        name: qt-qml-extensions-testapp-${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}.aab
        path: ${{ steps.aab.outputs.path }}
        if-no-files-found: error

    - name: Write Google Play service account
      if: ${{ github.event_name == 'push' || inputs.release_mode == 'publish_build' || inputs.release_mode == 'publish_build_and_store_entry' || inputs.release_mode == 'update_store_entry_only' }}
      env:
        GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
      run: |
        if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
          echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is required." >&2
          exit 1
        fi

        python3 - <<'PY'
        import json
        import os
        import stat
        import sys

        try:
            service_account = json.loads(os.environ["GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"])
        except json.JSONDecodeError as error:
            print(
                "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON must contain exactly one JSON object: "
                f"{error}",
                file=sys.stderr,
            )
            sys.exit(1)

        required_keys = ("type", "project_id", "private_key", "client_email")
        missing_keys = [key for key in required_keys if not service_account.get(key)]
        if missing_keys:
            print(
                "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON is missing required key(s): "
                + ", ".join(missing_keys),
                file=sys.stderr,
            )
            sys.exit(1)

        path = os.environ["GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH"]
        with open(path, "w", encoding="utf-8") as file:
            json.dump(service_account, file)
            file.write("\n")
        os.chmod(path, stat.S_IRUSR | stat.S_IWUSR)
        PY

    - name: Set up Ruby for Fastlane
      if: ${{ github.event_name == 'workflow_dispatch' && (inputs.release_mode == 'publish_build_and_store_entry' || inputs.release_mode == 'update_store_entry_only') }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Upload to Google Play
      if: ${{ github.event_name == 'push' || inputs.release_mode == 'publish_build' || inputs.release_mode == 'publish_build_and_store_entry' }}
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJson: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH }}
        packageName: ${{ env.PACKAGE_NAME }}
        releaseFiles: ${{ steps.aab.outputs.path }}
        tracks: ${{ env.PLAY_TRACK }}
        status: ${{ env.RELEASE_STATUS }}
        releaseName: ${{ env.VERSION_NAME }}

    - name: Update Google Play store entry
      if: ${{ github.event_name == 'workflow_dispatch' && (inputs.release_mode == 'publish_build_and_store_entry' || inputs.release_mode == 'update_store_entry_only') }}
      env:
        GOOGLE_PLAY_CHANGES_NOT_SENT_FOR_REVIEW: ${{ inputs.store_entry_changes_not_sent_for_review }}
        GOOGLE_PLAY_VALIDATE_ONLY: ${{ inputs.store_entry_validate_only }}
        LANG: C.UTF-8
        LC_ALL: C.UTF-8
      run: bundle exec fastlane android update_store_entry
