version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    cooldown:
      default-days: 3
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      pre-commit-hooks:
        patterns:
          - "*"

  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      ruby-gems:
        patterns:
          - "*"
